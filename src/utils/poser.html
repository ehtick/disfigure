<!DOCTYPE html>

<html>
	<head>
		<script type="importmap">
		{
			"imports": {
				"three": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.webgpu.min.js",
				"three/webgpu": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.webgpu.min.js",
				"three/tsl": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.tsl.min.js",
				"three/addons/": "https://cdn.jsdelivr.net/npm/three@0.184.0/examples/jsm/"
			}
		}
		</script>
		<style>
			.right {
				float: right;
				color: gray;
			}
			
			.title[role="button"] {
				border-radius: 1em;
			}

			.slider {
				
			}
			
		</style>
	</head>


	<body>		
		<script type="module">

			import * as THREE from 'three';
			import * as lil from "three/addons/libs/lil-gui.module.min.js";
			import * as Happy from '../disfigure.js';
			import {JOINTS} from '../assets.js';
			
			import {uniform} from 'three/tsl';
			
			import { disfigureBodySelect, selectUniform } from './select.js';

			new Happy.World({ground:false, stats:!true, shadows:!false});
			Happy.camera.position.set(0,1.6,1);
			Happy.controls.target.set(0,1.6,0);
			Happy.controls.update();
			
var Body = Happy.Man;			
//var Body = Happy.Woman;			
//var Body = Happy.Child;			

			var frame = new Body();
			frame.material.color = new THREE.Color('black');
			frame.material.transparent = true;
			frame.material.opacity = 0.25;
			frame.material.wireframe = true;

			Body.pool = null;

			var figure = new Body();
			figure.material.polygonOffset = true;
			figure.material.polygonOffsetUnits = 1;
			figure.material.polygonOffsetFactor = 1;
			
			var axis = new THREE.AxesHelper( );
			Happy.scene.add( axis );
	
			function resetPose() {
				for( var joint of JOINTS ) figure[joint.name].set(0,0,0);
				for( var joint of JOINTS ) frame[joint.name].set(0,0,0);
			}
			
		var data = {
			joint: 0,
			pivot: new THREE.Vector3(),
			range: new THREE.Vector4(),
			reset: resetPose,
		}
		
		
		var gui, jointController;
		
		
		function installGui() {
			gui = new lil.GUI();
			

			var jointList = {'nothing':-1,};
			for( var i in JOINTS ) {
				jointList[ JOINTS[i].name ] = Number(i);
			}
			
			jointController = gui.add( data, 'joint', jointList, 0 ).onChange( selectJoint );

			gui.add( data.pivot
, 'x', -1, 1 ).step(0.001).decimals(3).name(' &mdash; pivot <span class="right">x</span>').onChange( ()=>updatePivot( ) );
			gui.add( data.pivot, 'y', -0.1, 1.8 ).step(0.001).decimals(3).name('<span class="right">y</span>').onChange( ()=>updatePivot( ) );
			gui.add( data.pivot, 'z', -0.2, 0.2 ).step(0.001).decimals(3).name('<span class="right">z</span>').onChange( ()=>updatePivot( ) );

			gui.add( data.range, 'x', -2, 2 ).step(0.0001).decimals(4).name(' &mdash; range <span class="right">x</span>').onChange( ()=>updateRange( ) );
			gui.add( data.range, 'y', -2, 2 ).step(0.0001).decimals(4).name('<span class="right">y</span>').onChange( ()=>updateRange( ) );
			gui.add( data.range, 'z', -2, 2 ).step(0.0001).decimals(4).name('<span class="right">z</span>').onChange( ()=>updateRange( ) );
			gui.add( data.range, 'w', -2, 2 ).step(0.0001).decimals(4).name('<span class="right">w</span>').onChange( ()=>updateRange( ) );


			gui.add( data, 'reset' );

			var folder, subfolder;
			

			function add( nameAxis, min, max, full ) {
			
				var name = nameAxis.split('.')[0];
				var axis = nameAxis.split('.')[1];
				var index = JOINTS.findIndex( (a)=>a.name==name ); 
				var a = subfolder.add( figure[name], axis, min, max ).step(5).decimals(0);
				
				if( full )
					a.name( '&nbsp; &nbsp; '+name+' <span class="right">'+axis+'</span>');
				else
					a.name( ' <span class="right">'+axis+'</span>');
					
				a.$input.onclick = ()=>selectJoint( index );
				a.$slider.onclick = ()=>selectJoint( index );
			}
			
			folder = gui.addFolder( 'TORSO' ).close();
			subfolder = folder;

			/*
			add( 'torso.x', -180, 180, true );
			add( 'torso.y', -180, 180 );
			add( 'torso.z', -180, 180 );
			*/
	
			add( 'head.x', -180, 180, true );
			add( 'head.y', -180, 180 );
			add( 'head.z', -180, 180 );
	
			add( 'chest.x', -180, 180, true );
			add( 'chest.y', -180, 180 );
			add( 'chest.z', -180, 180 );
	
			add( 'waist.x', -180, 180, true );
			add( 'waist.y', -180, 180 );
			add( 'waist.z', -180, 180 );
	
			folder = gui.addFolder( 'LEFT LEG' ).close();
			subfolder = folder;

			add( 'l_leg.x', -180, 180, true );
			add( 'l_leg.z', -180, 180 );

			add( 'l_thigh.y', -180, 180, true );

			add( 'l_knee.x', -180, 180, true );
			add( 'l_knee.z', -180, 180 );

			add( 'l_shin.y', -180, 180, true );

			add( 'l_ankle.x', -180, 180, true );
			add( 'l_ankle.z', -180, 180 );

			add( 'l_foot.x', -180, 180, true );
	
			folder = gui.addFolder( 'RIGHT LEG' ).close();
			subfolder = folder;

			add( 'r_leg.x', -180, 180, true );
			add( 'r_leg.z', -180, 180 );

			add( 'r_thigh.y', -180, 180, true );

			add( 'r_knee.x', -180, 180, true );
			add( 'r_knee.z', -180, 180 );

			add( 'r_shin.y', -180, 180, true );

			add( 'r_ankle.x', -180, 180, true );
			add( 'r_ankle.z', -180, 180 );

			add( 'r_foot.x', -180, 180, true );

			folder = gui.addFolder( 'LEFT ARM' ).close();
			subfolder = folder;

			add( 'l_arm.x', -180, 180, true );
			add( 'l_arm.y', -180, 180 );
			add( 'l_arm.z', -180, 180 );

			add( 'l_elbow.y', -180, 180, true );

			add( 'l_forearm.x', -180, 180, true );

			add( 'l_wrist.y', -180, 180, true );
			add( 'l_wrist.z', -180, 180 );

			folder = gui.addFolder( 'RIGHT ARM' ).close();
			subfolder = folder;

			add( 'r_arm.x', -180, 180, true );
			add( 'r_arm.y', -180, 180 );
			add( 'r_arm.z', -180, 180 );

			add( 'r_elbow.y', -180, 180, true );

			add( 'r_forearm.x', -180, 180, true );

			add( 'r_wrist.y', -180, 180, true );
			add( 'r_wrist.z', -180, 180 );

			folder = gui.addFolder( 'LEFT HAND' )//.close();

			subfolder = folder.addFolder( ':: THUMB' ).close();
			add( 'l_thumb_base.x', -180, 180, true );
			add( 'l_thumb_base.y', -180, 180 );
			add( 'l_thumb_base.z', -180, 180 );
			add( 'l_thumb_tip.y', -180, 180, true );

			subfolder = folder.addFolder( ':: INDEX' ).close();
			add( 'l_index_base.y', -180, 180, true );
			add( 'l_index_base.z', -180, 180 );
			add( 'l_index_mid.z', -180, 180, true );
			add( 'l_index_tip.z', -180, 180, true );

			subfolder = folder.addFolder( ':: MIDDLE' ).close();
			add( 'l_middle_base.y', -180, 180, true );
			add( 'l_middle_base.z', -180, 180 );
			add( 'l_middle_mid.z', -180, 180, true );
			add( 'l_middle_tip.z', -180, 180, true );

			subfolder = folder.addFolder( ':: RING' ).close();
			add( 'l_ring_base.y', -180, 180, true );
			add( 'l_ring_base.z', -180, 180 );
			add( 'l_ring_mid.z', -180, 180, true );
			add( 'l_ring_tip.z', -180, 180, true );

			subfolder = folder.addFolder( ':: PINKY' )//.close();
			add( 'l_pinky_base.y', -180, 180, true );
			add( 'l_pinky_base.z', -180, 180 );
			add( 'l_pinky_mid.z', -180, 180, true );
			add( 'l_pinky_tip.z', -180, 180, true );

			folder = gui.addFolder( 'RIGHT HAND' ).close();
			
			subfolder = folder.addFolder( ':: THUMB' );
			add( 'r_thumb_base.x', -180, 180, true );
			add( 'r_thumb_base.y', -180, 180 );
			add( 'r_thumb_base.z', -180, 180 );
			add( 'r_thumb_tip.y', -180, 180, true );

			subfolder = folder.addFolder( ':: INDEX' );
			add( 'r_index_base.y', -180, 180, true );
			add( 'r_index_base.z', -180, 180 );
			add( 'r_index_mid.z', -180, 180, true );
			add( 'r_index_tip.z', -180, 180, true );

			subfolder = folder.addFolder( ':: MIDDLE' );
			add( 'r_middle_base.y', -180, 180, true );
			add( 'r_middle_base.z', -180, 180 );
			add( 'r_middle_mid.z', -180, 180, true );
			add( 'r_middle_tip.z', -180, 180, true );

			subfolder = folder.addFolder( ':: RING' );
			add( 'r_ring_base.y', -180, 180, true );
			add( 'r_ring_base.z', -180, 180 );
			add( 'r_ring_mid.z', -180, 180, true );
			add( 'r_ring_tip.z', -180, 180, true );

			subfolder = folder.addFolder( ':: PINKY' );
			add( 'r_pinky_base.y', -180, 180, true );
			add( 'r_pinky_base.z', -180, 180 );
			add( 'r_pinky_mid.z', -180, 180, true );
			add( 'r_pinky_tip.z', -180, 180, true );

		}


		function selectJoint( jointIndex ) {

			data.joint = jointIndex;
			selectUniform.value = jointIndex;
			console.log('>>',jointIndex);
			
			if( jointIndex<0 ) {
				axis.visible = false;
			} else {
				data.pivot.copy( figure.pool.data.pivots[jointIndex].value );
				data.range.copy( figure.pool.data.ranges[jointIndex].value );
				axis.visible = true;
				axis.position.copy( figure.pool.data.pivots[jointIndex].value );
				Happy.controls.target = axis.position;
				
			}
			
			if( gui ) for( var controller of gui.controllers) controller.updateDisplay();
		}
				
		function updatePivot( ) {
			figure.pool.data.pivots[data.joint].value.set( ...data.pivot );
			axis.position.set( ...data.pivot );
		}
		
		
		function updateRange( ) {
			figure.pool.data.ranges[data.joint].value.set( ...data.range );
		}
		
		figure.pool.onLoad = ()=>{

			for( var i = 0; i<52; i++ ) {
				figure.pool.data.pivots[i] = uniform(figure.pool.data.pivots[i]);
				figure.pool.data.ranges[i] = uniform(figure.pool.data.ranges[i]);
			}

			figure.material.emissiveNode = disfigureBodySelect( figure.pool.data );

//			Happy.setAnimationLoop( (t)=>{
//			console.log(figure.pool.data.pivots[0]);
//				figure.pool.data.pivots[0].value.y = 100*Math.sin(t/1000);
//				for( var joint of JOINT_NAMES )
//					frame[joint].set( figure[joint].x, figure[joint].y, figure[joint].z );
//			} );

			resetPose();
			installGui();
			selectJoint( -1 );
		}

		</script>
	</body>
</html>
