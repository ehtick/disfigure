			import * as Happy from './disfigure.js';

			import { perlinNoise as tslTexture } from 'tsl-textures';

			new Happy.World({ground:!false, stats:true, shadows:!false});

			var tex = tslTexture( { scale: 2, seed: instanceIndex } ).abs().step(0.5).toVar();

			for( var i=0; i<50; i++ ) {
			
				var body = Math.random()<1/3?new Child(  ):( Math.random()<1/2?new Woman(  ):new Man(  ) );

				var r = ( i**0.5 )*0.5,
					a = 2*Math.PI*i*(1 - 2/(1+Math.sqrt(5)));

				body.setPosition( r*Math.cos(a), -1, r*Math.sin(a), 1 );
				body.material.emissiveIntensity = 1;
				body.material.metalness = 0.2;
				body.material.colorNode = tex//vec3( 0, 1, 10 ).mul( tex ).add( tex.oneMinus() );

			}

//Happy.Man.pool.material.color = new THREE.Color(0,1,5);

			Happy.setAnimationLoop((t) => {

				t = t/3000;

				var k=0;
				for( var figure of Happy.everybody ) {
					//k=figure.id*22;
/*
					figure.torso.x = Happy.chaotic(t/3,k++,-30,30);
					figure.torso.y = Happy.chaotic(t/3,k++,-360,360);
					figure.torso.z = Happy.chaotic(t/3,k++,-30,30);
*/


					figure.head.x = Happy.chaotic(t,k++,-30,30);
					figure.head.y = Happy.chaotic(t*2,k++,-60,60);
					figure.head.z = Happy.chaotic(t,k++,-30,30);

					figure.chest.x = Happy.chaotic(t,k++,-30,30);
					figure.chest.y = Happy.chaotic(t,k++,-60,60);
					figure.chest.z = Happy.chaotic(t,k++,-30,30);

					figure.waist.x = Happy.chaotic(t,k++,-30,30);
					figure.waist.y = Happy.chaotic(t,k++,-60,60);
					figure.waist.z = Happy.chaotic(t,k++,-30,30);
					
					
					
					figure.l_foot.x = Happy.chaotic(t,k++,-40,40);
					figure.r_foot.x = Happy.chaotic(t,k++,-40,40);

					figure.l_ankle.x = Happy.chaotic(t,k++,-30,30);
					figure.l_ankle.z = Happy.chaotic(t,k++,-30,30);
					figure.r_ankle.x = Happy.chaotic(t,k++,-30,30);
					figure.r_ankle.z = Happy.chaotic(t,k++,-30,30);

					figure.l_shin.y = Happy.chaotic(t,k++,-60,60);
					figure.r_shin.y = Happy.chaotic(t,k++,-60,60);

					figure.l_knee.x = Happy.chaotic(t,k++,0,120);
					figure.l_knee.z = Happy.chaotic(t,k++,-10,10);
					figure.r_knee.x = Happy.chaotic(t,k++,0,120);
					figure.r_knee.z = Happy.chaotic(t,k++,-10,10);

					figure.l_thigh.y = Happy.chaotic(t,k++,-40,40);
					figure.r_thigh.y = Happy.chaotic(t,k++,-40,40);

					figure.l_leg.x = Happy.chaotic(t,k++,-70,15);
					figure.l_leg.z = Happy.chaotic(t,k++,0,40);
					figure.r_leg.x = Happy.chaotic(t,k++,-70,15);
					figure.r_leg.z = Happy.chaotic(t,k++,0,40);
								
					
					figure.l_wrist.y = Happy.chaotic(t,k++,-20,45);
					figure.l_wrist.z = Happy.chaotic(t,k++,-90,90);
					figure.r_wrist.y = Happy.chaotic(t,k++,-20,45);
					figure.r_wrist.z = Happy.chaotic(t,k++,-90,90);

					figure.l_forearm.x = Happy.chaotic(t,k++,-60,30);
					figure.r_forearm.x = Happy.chaotic(t,k++,-60,30);

					figure.l_elbow.y = Happy.chaotic(t,k++,-160,0);
					figure.r_elbow.y = Happy.chaotic(t,k++,-160,0);

					figure.l_arm.x = Happy.chaotic(t,k++,-40,40);
					figure.l_arm.y = Happy.chaotic(t,k++,-60,15);
					figure.l_arm.z = Happy.chaotic(t,k++,-60,15);
					figure.r_arm.x = Happy.chaotic(t,k++,-40,40);
					figure.r_arm.y = Happy.chaotic(t,k++,-60,15);
					figure.r_arm.z = Happy.chaotic(t,k++,-60,15);


					figure.l_thumb_base.x = Happy.chaotic(3*t,k++,-60,0);
					figure.l_thumb_base.y = Happy.chaotic(3*t,k++,0,50);
					figure.l_thumb_base.z = Happy.chaotic(3*t,k++,-50,15);
					figure.r_thumb_base.x = Happy.chaotic(3*t,k++,-60,0);
					figure.r_thumb_base.y = Happy.chaotic(3*t,k++,0,50);
					figure.r_thumb_base.z = Happy.chaotic(3*t,k++,-50,15);
					figure.l_thumb_tip.y = Happy.chaotic(3*t,k++,0,90);
					figure.r_thumb_tip.y = Happy.chaotic(3*t,k++,0,90);

					figure.l_index_base.z = Happy.chaotic(3*t,k++,-90,10);
					figure.r_index_base.z = Happy.chaotic(3*t,k++,-90,10);
					figure.l_index_mid.z = Happy.chaotic(3*t,k++,-90,0);
					figure.r_index_mid.z = Happy.chaotic(3*t,k++,-90,0);
					figure.l_index_tip.z = Happy.chaotic(3*t,k++,-90,0);
					figure.r_index_tip.z = Happy.chaotic(3*t,k++,-90,0);

					figure.l_middle_base.z = Happy.chaotic(3*t,k++,-90,10);
					figure.r_middle_base.z = Happy.chaotic(3*t,k++,-90,10);
					figure.l_middle_mid.z = Happy.chaotic(3*t,k++,-90,0);
					figure.r_middle_mid.z = Happy.chaotic(3*t,k++,-90,0);
					figure.l_middle_tip.z = Happy.chaotic(3*t,k++,-90,0);
					figure.r_middle_tip.z = Happy.chaotic(3*t,k++,-90,0);


					figure.l_ring_base.z = Happy.chaotic(3*t,k++,-90,10);
					figure.r_ring_base.z = Happy.chaotic(3*t,k++,-90,10);
					figure.l_ring_mid.z = Happy.chaotic(3*t,k++,-90,0);
					figure.r_ring_mid.z = Happy.chaotic(3*t,k++,-90,0);
					figure.l_ring_tip.z = Happy.chaotic(3*t,k++,-90,0);
					figure.r_ring_tip.z = Happy.chaotic(3*t,k++,-90,0);

					figure.l_pinky_base.z = Happy.chaotic(3*t,k++,-90,10);
					figure.r_pinky_base.z = Happy.chaotic(3*t,k++,-90,10);
					figure.l_pinky_mid.z = Happy.chaotic(3*t,k++,-90,0);
					figure.r_pinky_mid.z = Happy.chaotic(3*t,k++,-90,0);
					figure.l_pinky_tip.z = Happy.chaotic(3*t,k++,-90,0);
					figure.r_pinky_tip.z = Happy.chaotic(3*t,k++,-90,0);


					var h = Happy.chaotic(3*t,k++,-10,10);
					
					figure.l_index_base.y = Math.min(0,3*h);
					figure.r_index_base.y = Math.min(0,3*h);

					figure.l_middle_base.y = Math.min(0,h);
					figure.r_middle_base.y = Math.min(0,h);

					figure.l_ring_base.y = Math.max(0,-h);
					figure.r_ring_base.y = Math.max(0,-h);

					figure.l_pinky_base.y = Math.max(0,-3*h);
					figure.r_pinky_base.y = Math.max(0,-3*h);



//					figure.update( );
				}
