<!DOCTYPE html>

<html>

<body>
	<header>
		<h1><b>Disfigure</b></h1>
		<h3>Motion of head, chest and waist</h3>
	</header>

	<div id="spinner"></div>

	<script src="importmap.js"></script>
	<script type="module">

		import * as THREE from 'three';
		import * as TSL from 'three/tsl';
		import * as Happy from 'disfigure';
		import * as Red from 'label';


		// create a default world

		new Happy.World( );
		Happy.camera.position.set( 1.5, 1.5, 3 );


		// create 3 man for X, Y and Z rotations

		var manX = new Happy.Man( 1.5 );	
		manX.position.x = -0.7;
		manX.head.attach( new Red.Label( 'X', 0.8, [0, 0.24, 0] ) );
		manX.head.attach( new Red.CurvedArrow( 0.5, [-25, 25], [1, 1, 0], [0, -0.43, 0.05] ) );
		manX.chest.attach( new Red.CurvedArrow( 0.5, [-25, 25], [1, 1, 0], [0, -0.43, 0] ) );
		manX.waist.attach( new Red.CurvedArrow( 0.5, [-25, 25], [1, 1, 0], [0, -0.43, 0] ) );

		var manY = new Happy.Man( 1.5 );
		manY.head.attach( new Red.Label( 'Y', 0.8, [0, 0.24, 0] ) );
		manY.head.attach( new Red.CurvedArrow( 0.15, [-95, 95], [-1, 0, -1], [0, 0.05, 0.05] ) );
		manY.chest.attach( new Red.CurvedArrow( 0.15, [-65, 65], [-1, 0, -1], [0, 0.05, -0.05] ) );
		manY.waist.attach( new Red.CurvedArrow( 0.15, [-65, 65], [-1, 0, -1], [0, 0.05, -0.05] ) );

		var manZ = new Happy.Man( 1.5 );
		manZ.position.x = 0.7;
		manZ.head.attach( new Red.Label( 'Z', 0.8, [0, 0.24, 0] ) );
		manZ.head.attach( new Red.CurvedArrow( 0.5, [-20, 20], [2, 0, -1], [0, -0.43, 0.05] ) );
		manZ.chest.attach( new Red.CurvedArrow( 0.7, [-20, 20], [2, 0, -1], [0, -0.65, 0.02] ) );
		manZ.waist.attach( new Red.CurvedArrow( 0.7, [-20, 20], [2, 0, -1], [0, -0.65, 0.02] ) );
		
		
		// a TSL coloring function to mark head, chest and waist
		
		var recolor = TSL.Fn( ()=> {
		
			var color = TSL.vec3( 1, 1, 1 ),
				select = TSL.vec3( 0.5, 0.5, 0.5 );
			
			var p = TSL.positionGeometry;
			
			// head
			TSL.If( p.y.add(p.z.div(2)).greaterThan(1.51), ()=>{color.assign(select);} );
			
			// chest
			TSL.If( p.y.sub(1.29).abs().lessThan(0.08), ()=>{color.assign(select);} );
			
			// waist
			TSL.If( p.y.sub(1.07).abs().lessThan(0.08), ()=>{color.assign(select);} );

			return color;
			
		} )();
		
		manX.pool.material.colorNode = recolor;
		
		
		
		// move the people
		
		Happy.setAnimationLoop( ( t )=>{

			var a = Happy.regular( t/1000, 0, -30, 30 );
			
			manX.head.x = a;
			manX.chest.x = a;
			manX.waist.x = a;
			
			a = Happy.regular( t/1000, 1, -30, 30 );

			manY.head.y = a;
			manY.chest.y = a;
			manY.waist.y = a;
						
			a = Happy.regular( t/1000, 2, -15, 15 );
			
			manZ.head.z = a;
			manZ.chest.z = a;
			manZ.waist.z = a;
						
		} );
		
	</script>
</body>
</html>
