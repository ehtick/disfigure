<!DOCTYPE html>

<html>

<body>
	<header>
		<h1><b>Disfigure</b></h1>
		<h3>Directions of motion of fingers</h3>
	</header>

	<div id="spinner"></div>

	<script src="importmap.js"></script>
	<script type="module">

		import * as THREE from 'three';
		import * as TSL from 'three/tsl';
		import * as Happy from 'disfigure';
		import * as Red from 'label';


		// create a default world

		new Happy.World( {ground: !false} );
		Happy.camera.position.set( 0, 1.5, 1.2 );
		Happy.controls.target.y = 1.2;

		// a TSL coloring function to mark body parts

		var recolorX = TSL.Fn( ()=> {
		
			var color = TSL.vec3( 1, 1, 1 ),
				select = TSL.vec3( 0.5, 0.5, 0.5 );
			
			var p = TSL.positionGeometry;
			
			// thumb base
			TSL.If( p.x.abs().sub(0.725).abs().lessThan(0.04).and(p.z.abs().sub(0.025).abs().lessThan(0.015)) , ()=>{color.assign(select);} );
			
			return color;
			
		} )();


		var recolorY = TSL.Fn( ()=> {
		
			var color = TSL.vec3( 1, 1, 1 ),
				select = TSL.vec3( 0.5, 0.5, 0.5 );
			
			var p = TSL.positionGeometry;
			
			// thumb base
			TSL.If( p.x.abs().sub(0.725).abs().lessThan(0.04).and(p.z.abs().sub(0.025).abs().lessThan(0.01)) , ()=>{color.assign(select);} );

			// index base
			TSL.If( p.x.abs().sub(0.78).abs().lessThan(0.01).and(p.z.abs().sub(0.05).abs().lessThan(0.008)) , ()=>{color.assign(select);} );

			// middle base
			TSL.If( p.x.abs().sub(0.79).abs().lessThan(0.01).and(p.z.abs().sub(0.0685).abs().lessThan(0.008)) , ()=>{color.assign(select);} );

			// ring base
			TSL.If( p.x.abs().sub(0.785).abs().lessThan(0.01).and(p.z.abs().sub(0.086).abs().lessThan(0.008)) , ()=>{color.assign(select);} );

			// pinky base
			TSL.If( p.x.abs().sub(0.78).abs().lessThan(0.01).and(p.z.abs().sub(0.105).abs().lessThan(0.008)) , ()=>{color.assign(select);} );

			return color;
			
		} )();


		// create 2 man for X and Y rotations
		var manX = new Happy.Man( 1.5 );
		manX.position.x = -0.25;
		manX.torso.y = 10;
		
		manX.l_arm.y = manX.r_arm.y = 85;
		manX.l_arm.z = manX.r_arm.z = 0;
		manX.l_forearm.x = manX.r_forearm.x = -85;
		manX.head.attach( new Red.Label( 'X', 0.3, [0, 0.12, 0.111], [-15,0,0] ) );
		manX.l_thumb.attach( new Red.CurvedArrow( 0.1, [-65, 65], [2.1, 1.2, 0], [-0.02, 0, -0.02] ) );
		manX.r_thumb.attach( new Red.CurvedArrow( 0.1, [-65, 65], [2.1, 0.8, 0], [0.02, 0, -0.02] ) );
		
		manX.l_thumb.attached[0].scale.setScalar(0.4);
		manX.r_thumb.attached[0].scale.setScalar(0.4);
		
		manX.pool.material.colorNode = recolorX;
		
		Happy.Man.pool = null;
		var manY = new Happy.Man( 1.5 );
		manY.position.x = 0.25;
		manY.torso.y = -10;
		manY.l_arm.y = manY.r_arm.y = 85;
		manY.l_arm.z = manY.r_arm.z = 10;
		manY.l_forearm.x = manY.r_forearm.x = -10;
		manY.l_wrist.z = manY.r_wrist.z = 70;
		manY.head.attach( new Red.Label( 'Y', 0.3, [0, 0.12, 0.111], [-15,0,0] ) );

		manY.l_thumb_tip.attach( new Red.CurvedArrow( 0.1, [-45, 45], [1, 0, 0.3], [0.01, 0, 0.01] ) );
		manY.r_thumb_tip.attach( new Red.CurvedArrow( 0.1, [-45, 45], [-1, 0, 2+0.3], [-0.01, 0, 0.01] ) );

		manY.l_index_tip.attach( new Red.CurvedArrow( 0.1, [5, 35], [1, 0, 0-0.2] ) );
		manY.r_index_tip.attach( new Red.CurvedArrow( 0.1, [5, 35], [-1, 0, 2-0.2] ) );

		manY.l_middle_tip.attach( new Red.CurvedArrow( 0.1, [5, 35], [1, 0, 0-0.2], [0.02, 0, 0] ) );
		manY.r_middle_tip.attach( new Red.CurvedArrow( 0.1, [5, 35], [-1, 0, 2-0.2], [-0.02, 0, 0] ) );

		manY.l_ring_tip.attach( new Red.CurvedArrow( 0.1, [5, 35], [-1, 0, 0-0.2], [0.02, 0, 0] ) );
		manY.r_ring_tip.attach( new Red.CurvedArrow( 0.1, [5, 35], [1, 0, 2-0.2], [-0.02, 0, 0] ) );
		
		manY.l_pinky_tip.attach( new Red.CurvedArrow( 0.1, [5, 35], [-1, 0, 0-0.2] ) );		
		manY.r_pinky_tip.attach( new Red.CurvedArrow( 0.1, [5, 35], [1, 0, 2-0.2] ) );
		
		manY.l_thumb_tip.attached[0].scale.setScalar(0.25);
		manY.r_thumb_tip.attached[0].scale.setScalar(0.25);

		manY.l_index_tip.attached[0].scale.setScalar(0.25);
		manY.r_index_tip.attached[0].scale.setScalar(0.25);

		manY.l_middle_tip.attached[0].scale.setScalar(0.25);
		manY.r_middle_tip.attached[0].scale.setScalar(0.25);

		manY.l_ring_tip.attached[0].scale.setScalar(0.25);
		manY.r_ring_tip.attached[0].scale.setScalar(0.25);

		manY.l_pinky_tip.attached[0].scale.setScalar(0.25);
		manY.r_pinky_tip.attached[0].scale.setScalar(0.25);

		manY.pool.material.colorNode = recolorY;
			
		
		// move the people
		
		Happy.setAnimationLoop( ( t )=>{

			manX.l_thumb.x = Happy.regular( t/500, 0, -20, 60 );
			manX.r_thumb.x = manX.l_thumb.x;

			manY.l_thumb.y = Happy.regular( t/500, 0, -30, 20 );
			
			var a = Happy.regular( t/500, 0, -2, 10 );
			manY.l_index.y = manY.l_pinky.y = 3*a;
			manY.l_middle.y = manY.l_ring.y = a;

			manY.r_thumb.y = Happy.regular( t/500, 0, -30, 20 );

			a = Happy.regular( t/500, 0, -2, 10 );
			manY.r_index.y = manY.r_pinky.y = 3*a;
			manY.r_middle.y = manY.r_ring.y = a;

/*
			manY.l_arm.y = Happy.regular( t/500, 4, -10, 40 );
			manY.r_arm.y = manY.l_arm.y;
			manY.l_elbow.y = Happy.regular( t/1000, 8, 0, 80 );
			manY.r_elbow.y = manY.l_elbow.y;
			manY.l_wrist.y = Happy.regular( t/400, 6, -30, 30 );
			manY.r_wrist.y = manY.l_wrist.y;
			
			manZ.l_arm.z = Happy.regular( t/1000, 2, -40, 20 );
			manZ.l_wrist.z = Happy.regular( t/400, 3, -40, 40 );
			manZ.r_arm.z = manZ.l_arm.z;
			manZ.r_wrist.z = manZ.l_wrist.z;
			*/

		} );
		
	</script>
</body>
</html>
