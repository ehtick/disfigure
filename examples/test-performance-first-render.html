<!DOCTYPE html>

<html>

<body>
	<header>
		<h1><b>Disfigure</b></h1>
		<h3>Performance test &mdash; first render</h3>
	</header>

	<div id="spinner"></div>

	<script src="importmap.js"></script>
	<script type="module">


		console.time( 'First render' );
		
		import * as Happy from 'disfigure';


		// create a default world

		new Happy.World( );


		// create a man, a woman and a child

		var man = new Happy.Man( );
		man.position.x = -0.75;
		
		var woman = new Happy.Woman( );
		woman.position.x = 0.75;

		var child = new Happy.Child( );
		

		// move the people
		
		var lastT = -1;
		var firstRender = true;
		
		Happy.setAnimationLoop( ( t )=>{

			if( firstRender && t-lastT<10 )
			{
				console.timeEnd( 'First render' );
				firstRender = false;
			}
			if( firstRender ) lastT = t;


			for ( var somebody of Happy.everybody ) {

				somebody.head.y = Happy.chaotic( t/4000, somebody.uid, -40, 40 );
				somebody.head.x = Happy.chaotic( t/4000, -somebody.uid, -20, 60 );
				somebody.waist.y = somebody.head.y;

			}

		} );
		
	</script>
</body>
</html>
